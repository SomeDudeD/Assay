<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assay — Results</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0e1116;
         color:#e6edf3; padding:24px 16px 60px; max-width:760px; margin:0 auto; }
  h1 { font-size:26px; margin:0 0 4px; }
  .sub { color:#8b949e; font-size:14px; margin-bottom:28px; }
  h2 { font-size:16px; text-transform:uppercase; letter-spacing:.06em; color:#8b949e;
       margin:32px 0 14px; }
  .duel { display:flex; gap:16px; }
  .duel.trio { gap:10px; }
  .duel.trio .num { font-size:34px; }
  .duel.trio .side { padding:18px 8px; }
  @media (max-width:520px){ .duel.trio .num { font-size:26px; } .duel.trio .lbl { font-size:11px; } }
  .side { flex:1; background:#161b22; border:1px solid #21262d; border-radius:16px;
          padding:24px 16px; text-align:center; transition:.2s; }
  .side.win { border-color:#238636; background:#12271a; box-shadow:0 0 0 2px #23863644; }
  .side .lbl { font-size:13px; color:#8b949e; text-transform:uppercase; letter-spacing:.05em; }
  .side .num { font-size:52px; font-weight:800; margin:10px 0 4px; line-height:1; }
  .side .tag { font-size:12px; color:#8b949e; }
  .side.win .tag { color:#3fb950; font-weight:700; }
  .lift { text-align:center; margin:18px 0 0; font-size:15px; color:#8b949e; }
  .lift b { color:#3fb950; }
  .pending { background:#161b22; border:1px dashed #30363d; border-radius:14px;
             padding:22px; text-align:center; color:#8b949e; }
  table { width:100%; border-collapse:collapse; margin-top:10px; font-size:14px; }
  th,td { padding:8px 10px; text-align:right; border-bottom:1px solid #21262d; }
  th:first-child, td:first-child { text-align:left; }
  th { color:#8b949e; font-weight:600; }
  a { color:#2f81f7; }
  .foot { margin-top:36px; font-size:13px; }
</style>
</head>
<body>
  <h1>Assay — Crowd Results</h1>
  <div class="sub">Naive vs. absolute-weighted vs. relative-weighted (softmax) crowd. Lower Brier is better.</div>
  <div id="content">Loading…</div>
  <div class="foot"><a href="/leaderboard">→ Leaderboard</a> &nbsp;·&nbsp; <a href="/">→ Capture app</a></div>

<script>
let SOFTMAX_T = 0.05;
function fmt(x){ return x==null ? '—' : x.toFixed(4); }

function trio(title, block, note){
  if(!block || block.n===0){
    return `<h2>${title}</h2><div class="pending">Not resolved yet — ${note}</div>`;
  }
  const schemes = [
    {key:'naive_brier',    lbl:'Naive crowd',       tag:'mean of all forecasts'},
    {key:'absolute_brier', lbl:'Absolute-weighted',  tag:'weight = max(0, skill)'},
    {key:'relative_brier', lbl:'Relative-weighted',  tag:`softmax, T=${SOFTMAX_T}`},
  ];
  // winner = lowest brier among the non-null schemes
  let best=null;
  schemes.forEach(s=>{ const v=block[s.key]; if(v!=null && (best==null || v<block[best])) best=s.key; });

  const degenNote = block.absolute_degenerate
    ? `<div class="lift">⚠︎ Absolute weights are all zero (nobody beat the 0.5 baseline) — it collapses to the naive mean.</div>`
    : '';

  let cards = schemes.map(s=>{
    const v=block[s.key]; const win = s.key===best;
    const tag = win ? 'WINNER' : s.tag;
    return `<div class="side ${win?'win':''}">
        <div class="lbl">${s.lbl}</div>
        <div class="num">${fmt(v)}</div>
        <div class="tag">${tag}</div>
      </div>`;
  }).join('');

  return `<h2>${title} <span style="color:#8b949e;font-weight:400">· ${block.n} questions</span></h2>
    <div class="duel trio">${cards}</div>${degenNote}`;
}

function detailTable(block){
  if(!block || !block.detail || !block.detail.length) return '';
  let rows = block.detail.map(d=>`<tr><td>Q${d.question_id}</td><td>${d.outcome}</td>
     <td>${d.naive.toFixed(3)}</td><td>${d.absolute.toFixed(3)}</td><td>${d.relative.toFixed(3)}</td></tr>`).join('');
  return `<table><tr><th>Question</th><th>Outcome</th><th>Naive</th><th>Absolute</th><th>Relative</th></tr>${rows}</table>`;
}

async function load(){
  const d = await (await fetch('/results_data')).json();
  if(d.softmax_T!=null) SOFTMAX_T = d.softmax_T;
  let html = trio('Live questions', d.live, 'run the resolver at 5:00pm PT (resolve_live.py)');
  html += detailTable(d.live);
  html += trio('Holdout mode (fallback)', d.holdout,
               'needs forecasts — train on charts 1-5, score on 6-10');
  html += detailTable(d.holdout);
  html += `<div class="foot" style="color:#8b949e">${d.n_forecasters} forecaster(s) in pool.</div>`;
  document.getElementById('content').innerHTML = html;
}
load();
</script>
</body>
</html>
