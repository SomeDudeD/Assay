<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Assay — Forecast</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, system-ui, sans-serif;
    background: #0e1116; color: #e6edf3; padding: 16px 14px 120px;
    max-width: 560px; margin: 0 auto;
  }
  h1 { font-size: 22px; margin: 4px 0 2px; }
  .sub { color: #8b949e; font-size: 13px; margin-bottom: 18px; }
  .handle-box { margin-bottom: 22px; }
  label.fld { display:block; font-size: 13px; color:#8b949e; margin-bottom:6px; }
  input[type=text] {
    width: 100%; padding: 14px; font-size: 18px; border-radius: 10px;
    border: 1px solid #30363d; background:#161b22; color:#e6edf3;
  }
  .card {
    background:#161b22; border:1px solid #21262d; border-radius:14px;
    padding:16px; margin-bottom:16px;
  }
  .qnum { font-size:12px; color:#8b949e; letter-spacing:.05em; text-transform:uppercase; }
  .qprompt { font-size:16px; margin:6px 0 12px; line-height:1.35; }
  img.chart {
    width:100%; height:auto; border-radius:10px; background:#fff; display:block; margin-bottom:12px;
  }
  .val { font-size:44px; font-weight:700; text-align:center; margin:4px 0 8px; }
  .val span { font-size:20px; color:#8b949e; }
  input[type=range] {
    width:100%; height:38px; -webkit-appearance:none; background:transparent; margin:0;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height:8px; border-radius:6px; background:#30363d;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:34px; height:34px; border-radius:50%;
    background:#2f81f7; margin-top:-13px; border:3px solid #0e1116;
  }
  .ticks { display:flex; justify-content:space-between; font-size:11px; color:#8b949e; margin-top:2px; }
  #submit {
    position:fixed; left:0; right:0; bottom:0; max-width:560px; margin:0 auto;
    padding:18px; font-size:19px; font-weight:700; border:none;
    background:#238636; color:#fff; width:100%;
  }
  #submit:active { background:#1a6f2b; }
  #submit:disabled { background:#30363d; color:#8b949e; }
  .thanks { text-align:center; padding:60px 20px; }
  .thanks .big { font-size:60px; }
  .thanks h2 { font-size:26px; }
  .err { color:#f85149; text-align:center; padding:10px; }
</style>
</head>
<body>
<div id="app">
  <h1>Assay</h1>
  <div class="sub">Move each slider to your probability (0–100%). One submit at the bottom.</div>
  <div class="handle-box">
    <label class="fld" for="handle">Your handle</label>
    <input type="text" id="handle" placeholder="e.g. satoshi" autocomplete="off" autocapitalize="off">
  </div>
  <div id="questions"></div>
  <div id="err" class="err"></div>
</div>
<button id="submit" disabled>Loading…</button>

<script>
let QUESTIONS = [];

function card(q, idx) {
  const n = idx + 1;
  const kind = q.type === 'chart' ? 'Chart' : 'Live';
  const img = q.image ? `<img class="chart" src="${q.image}" alt="chart">` : '';
  return `
    <div class="card">
      <div class="qnum">${kind} · Question ${n} of ${QUESTIONS.length}</div>
      <div class="qprompt">${q.prompt}</div>
      ${img}
      <div class="val" id="val-${idx}">50<span>%</span></div>
      <input type="range" min="0" max="100" value="50" id="r-${idx}"
             oninput="document.getElementById('val-${idx}').innerHTML=this.value+'<span>%</span>'">
      <div class="ticks"><span>0 · No</span><span>50 · Unsure</span><span>100 · Yes</span></div>
    </div>`;
}

async function load() {
  try {
    const res = await fetch('/questions');
    const data = await res.json();
    QUESTIONS = data.questions || [];
    if (!QUESTIONS.length) throw new Error('no questions');
    document.getElementById('questions').innerHTML = QUESTIONS.map(card).join('');
    const btn = document.getElementById('submit');
    btn.disabled = false;
    btn.textContent = 'Submit all ' + QUESTIONS.length;
  } catch (e) {
    document.getElementById('err').textContent = 'Could not load questions. Refresh the page.';
  }
}

async function submit() {
  const btn = document.getElementById('submit');
  btn.disabled = true; btn.textContent = 'Submitting…';
  document.getElementById('err').textContent = '';
  const handle = document.getElementById('handle').value.trim();
  const answers = QUESTIONS.map((q, i) => ({
    type: q.type, id: q.id,
    probability: parseInt(document.getElementById('r-' + i).value, 10) / 100,
  }));
  try {
    const res = await fetch('/forecast', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({handle, answers}),
    });
    const out = await res.json();
    if (!res.ok || !out.ok) throw new Error(out.error || 'failed');
    document.getElementById('app').innerHTML =
      `<div class="thanks"><div class="big">✅</div>
       <h2>Thanks, ${out.handle}!</h2>
       <p class="sub">${out.written} forecasts recorded.</p></div>`;
    btn.style.display = 'none';
  } catch (e) {
    document.getElementById('err').textContent = 'Submit failed — try again.';
    btn.disabled = false; btn.textContent = 'Submit all ' + QUESTIONS.length;
  }
}

document.getElementById('submit').addEventListener('click', submit);
load();
</script>
</body>
</html>
